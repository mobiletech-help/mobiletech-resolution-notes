<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MobileTech Resolution Notes</title>

<style>
body {
  font-family: system-ui, Arial, sans-serif;
  background:#f8fafc;
  margin:0;
}
.wrapper {
  max-width:900px;
  margin:auto;
  padding:16px;
  padding-bottom:180px;
}
.top-bar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}
h1 { margin:0; font-size:20px; }
button {
  padding:8px 12px;
  border-radius:6px;
  border:1px solid #d1d5db;
  background:#fff;
  cursor:pointer;
}
.primary {
  background:#0f62fe;
  color:#fff;
}
.card {
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:8px;
  padding:12px;
  margin-bottom:16px;
}
label {
  font-size:12px;
  font-weight:600;
  margin-top:8px;
  display:block;
}
.hint {
  font-size:12px;
  color:#6b7280;
}
.row {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
@media(max-width:600px){ .row{grid-template-columns:1fr;} }

/* Inputs */
input, textarea, select {
  width:100%;
  padding:10px;
  border-radius:6px;
  border:2px solid #d1d5db;
  transition:.15s;
}
input:focus, textarea:focus, select:focus {
  outline:none;
  border-color:#0f62fe;
  box-shadow:0 0 0 3px rgba(15,98,254,.25);
}

/* Collapse */
details.crew {
  border:1px solid #e5e7eb;
  border-radius:8px;
  padding:8px;
  margin-top:12px;
}
details summary {
  font-weight:700;
  cursor:pointer;
  list-style:none;
}
summary::-webkit-details-marker { display:none; }
summary::before { content:"▶"; margin-right:6px; }
details[open] summary::before { transform:rotate(90deg); display:inline-block; }

.crew-grid,
.item-row {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:8px;
}

.bottom-bar {
  position:fixed;
  bottom:0; left:0; right:0;
  background:#fff;
  border-top:1px solid #e5e7eb;
  display:flex;
  justify-content:center;
  gap:8px;
  padding:10px;
}
</style>
</head>

<body>
<div class="wrapper">

<div class="top-bar">
  <h1>MobileTech Resolution Notes</h1>
  <button id="helpBtn">Help</button>
</div>

<datalist id="crewNames"></datalist>
<datalist id="truckList"></datalist>

<div class="card">
  <label>Customer</label>
  <input id="customer">
  <label>Lease / Location</label>
  <input id="location">
</div>

<div id="days"></div>
</div>

<div class="bottom-bar">
  <button id="clearAll">Clear All</button>
  <button id="nextDay" class="primary">Next Day</button>
  <button id="copyAll">Copy All</button>
</div>

<script>
const daysDiv=document.getElementById("days");

/* ===== Smartfill ===== */
function load(key,id){
  const dl=document.getElementById(id);
  dl.innerHTML="";
  (JSON.parse(localStorage.getItem(key))||[]).forEach(v=>{
    const o=document.createElement("option");
    o.value=v; dl.appendChild(o);
  });
}
function save(key,v,id){
  if(!v || v.length!==4) return;
  const arr=JSON.parse(localStorage.getItem(key))||[];
  if(!arr.includes(v)){
    arr.push(v);
    localStorage.setItem(key,JSON.stringify(arr));
    load(key,id);
  }
}
load("crewNames","crewNames");
load("truckList","truckList");

/* ===== Truck enforcement & duplicate check ===== */
function sanitizeTruck(inp){
  inp.value = inp.value.replace(/\D/g,"").slice(0,4);
}

function checkDuplicateTruck(inp){
  if(inp.value.length!==4) return;

  const dayCard = inp.closest(".card"); // date container
  const trucks = [...dayCard.querySelectorAll(".trucks input")]
    .map(i=>i.value)
    .filter(v=>v.length===4);

  const duplicates = trucks.filter(v=>v===inp.value);

  if(duplicates.length > 1){
    alert(`Truck # ${inp.value} is already used on this day.`);
  }
}

function validateTruck(inp){
  if(inp.value.length !== 4){
    if(inp.value !== ""){
      alert("Truck # must be exactly 4 digits.");
    }
    inp.value="";
  } else {
    save("truckList",inp.value,"truckList");
    checkDuplicateTruck(inp);
  }
}

/* ===== Crew ===== */
function updateCrewMembers(sel){
  const grid=sel.closest("details").querySelector(".crew-grid");
  const cnt=+sel.value;
  grid.innerHTML="";
  for(let i=0;i<cnt;i++){
    const inp=document.createElement("input");
    inp.placeholder=`Crew Member ${i+1}`;
    inp.setAttribute("list","crewNames");
    grid.appendChild(inp);
  }
}

function createCrew(num){
  const d=document.createElement("details");
  d.className="crew"; d.open=true;
  d.innerHTML=`
    <summary>Crew #${num}</summary>

    <label>Trucks (exactly 4 digits)</label>
    <div class="item-row trucks"></div>
    <button class="addTruck">Add Truck</button>

    <label>Crew size</label>
    <select>
      <option value="1">1‑Man Crew</option>
      <option value="2">2‑Man Crew</option>
      <option value="3">3‑Man Crew</option>
      <option value="4">4‑Man Crew</option>
      <option value="5">5‑Man Crew</option>
    </select>

    <label>Crew members</label>
    <div class="crew-grid"></div>

    <button class="remove">Delete Crew</button>
  `;

  const trucks=d.querySelector(".trucks");
  const addBtn=d.querySelector(".addTruck");

  function addTruck(){
    const inp=document.createElement("input");
    inp.inputMode="numeric";
    inp.maxLength=4;
    inp.placeholder="0000";
    inp.setAttribute("list","truckList");
    inp.oninput=()=>sanitizeTruck(inp);
    inp.onblur=()=>validateTruck(inp);
    trucks.appendChild(inp);
  }
  addBtn.onclick=addTruck;
  addTruck();

  const sel=d.querySelector("select");
  sel.onchange=()=>updateCrewMembers(sel);
  updateCrewMembers(sel);

  d.querySelector(".remove").onclick=()=>{
    const p=d.parentElement;
    d.remove();
    [...p.querySelectorAll("details")].forEach((c,i)=>{
      c.querySelector("summary").innerText=`Crew #${i+1}`;
    });
  };
  return d;
}

/* ===== Day ===== */
function today(){ return new Date().toISOString().split("T")[0]; }
function addDay(date){
  const card=document.createElement("div");
  card.className="card";
  const crews=document.createElement("div");
  const btn=document.createElement("button");
  btn.innerText="Add Crew";
  btn.onclick=()=>crews.appendChild(createCrew(crews.children.length+1));
  card.innerHTML=`<label>Date</label><input type="date" value="${date}">`;
  crews.appendChild(createCrew(1));
  card.appendChild(crews);
  card.appendChild(btn);
  daysDiv.appendChild(card);
}

nextDay.onclick=()=>{
  const last=daysDiv.lastElementChild.querySelector("input").value;
  const d=new Date(last+"T00:00");
  d.setDate(d.getDate()+1);
  addDay(d.toISOString().split("T")[0]);
};

clearAll.onclick=()=>{
  if(confirm("Clear all?")){
    daysDiv.innerHTML="";
    addDay(today());
  }
};

/* ===== Copy All ===== */
copyAll.onclick=()=>{
  let out=[];
  [...daysDiv.children].forEach(day=>{
    const d=new Date(day.querySelector("input").value+"T00:00");
    out.push(`${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}/${String(d.getFullYear()).slice(-2)}`);
    [...day.querySelectorAll("details")].forEach(cr=>{
      out.push(cr.querySelector("summary").innerText);
      const trucks=[...cr.querySelectorAll(".trucks input")].map(i=>i.value).filter(v=>v.length===4);
      if(trucks.length) out.push(`Trucks: ${trucks.join(", ")}`);
    });
    out.push("");
  });
  navigator.clipboard.writeText(out.join("\n"));
  alert("Copied.");
};

helpBtn.onclick=()=>alert(
  "Truck numbers must be exactly 4 digits. You will be warned if a truck is entered more than once on the same day."
);
