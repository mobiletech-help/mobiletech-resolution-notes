<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MobileTech Resolution Notes</title>

<style>
:root {
  --primary:#0F62FE;
  --border:#E5E7EB;
  --bg:#F8FAFC;
  --card:#FFFFFF;
  --muted:#6B7280;
}
body {
  margin:0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
  background:var(--bg);
}
.wrapper {
  max-width:900px;
  margin:auto;
  padding:16px;
  padding-bottom:140px;
}
h1 {font-size:20px;margin-bottom:8px;}
.card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  padding:12px;
  margin-bottom:16px;
}
label {
  font-size:12px;
  font-weight:600;
  margin-top:8px;
  display:block;
}
input, textarea, select, button {
  width:100%;
  padding:10px;
  border-radius:6px;
  border:1px solid var(--border);
  font-size:14px;
}
textarea {resize:vertical;}
.hint {
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
}
.row {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
@media(max-width:600px){.row{grid-template-columns:1fr}}

.crew-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:8px;
  margin-top:6px;
}
.divider {
  height:1px;
  background:var(--border);
  margin:12px 0;
}
.bottom-bar {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  justify-content:center;
  gap:8px;
  padding:10px;
  background:#fff;
  border-top:1px solid var(--border);
}
.primary {
  background:var(--primary);
  color:#fff;
  border-color:var(--primary);
}
.item-row {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:8px;
  margin-top:6px;
}
.delete-btn {
  background:#ef4444;
  color:#fff;
  border-color:#ef4444;
  margin-top:10px;
}
.small-btn {
  font-size:12px;
  padding:8px;
}
</style>
</head>

<body>
<div class="wrapper">

<h1>MobileTech Resolution Notes</h1>

<!-- Job Header -->
<div class="card">
  <label>Customer</label>
  <input id="customer" placeholder="Customer">
  <div class="hint">(Optional)</div>

  <label>Lease / Location</label>
  <input id="location" placeholder="Lease or Location">
  <div class="hint">(Optional)</div>
</div>

<div id="days"></div>

</div>

<div class="bottom-bar">
  <button class="primary" onclick="nextDay()">Next Day</button>
  <button onclick="copyAll()">Copy All</button>
</div>

<script>
const daysDiv = document.getElementById("days");

function today(){
  return new Date().toISOString().split("T")[0];
}

function addDay(date){
  const card=document.createElement("div");
  card.className="card day";
  card.innerHTML=`
    <label>Date</label>
    <input type="date" value="${date}">
    <div class="divider"></div>
    <div class="crews"></div>
    <button onclick="addCrew(this)">Add Crew</button>
  `;
  daysDiv.appendChild(card);
  addCrew(card.querySelector("button")); // Crew #1 automatic
}

function nextDay(){
  const lastDate = daysDiv.lastElementChild
    .querySelector("input[type=date]").value;
  const d=new Date(lastDate+"T00:00");
  d.setDate(d.getDate()+1);
  addDay(d.toISOString().split("T")[0]);
  daysDiv.lastElementChild.scrollIntoView({behavior:"smooth"});
}

function addCrew(btn){
  const crews=btn.previousElementSibling;
  const c=document.createElement("div");
  c.className="card crew";
  crews.appendChild(c);
  renderCrewCard(c);
  renumberCrews(crews);
}

function renderCrewCard(c){
  c.innerHTML=`
    <div class="crew-title"></div>

    <label>Size</label>
    <select onchange="renderCrewMembers(this)">
      <option value="1">1‑Man Crew</option>
      <option value="2">2‑Man Crew</option>
      <option value="3">3‑Man Crew</option>
      <option value="4">4‑Man Crew</option>
      <option value="5">5‑Man Crew</option>
    </select>

    <label>Crew Members</label>
    <div class="crew-grid"></div>

    <label>Start Time / Stop Time</label>
    <div class="row">
      <div>
        <input type="time"><div class="hint">Start Time</div>
      </div>
      <div>
        <input type="time"><div class="hint">Stop Time</div>
      </div>
    </div>

    <label>Work Performed</label>
    <div class="hint">(Work completed, travel, standby, weather delays, additional work requested.)</div>
    <textarea></textarea>

    <label>Rentals (if applicable)</label>
    <div class="hint">(Item / Unit – details like HP, qty, mileage – vendor – PO)</div>
    <div class="rentals"></div>
    <button class="small-btn" onclick="addItem(this)">Add Rental</button>

    <label>Materials (if applicable)</label>
    <div class="hint">(Materials used and sold to customer – item, qty, size/spec.)</div>
    <div class="materials"></div>
    <button class="small-btn" onclick="addItem(this)">Add Material</button>

    <button class="delete-btn" onclick="deleteCrew(this)">Delete Crew</button>
  `;
  renderCrewMembers(c.querySelector("select"));
}

function renderCrewMembers(sel){
  const grid=sel.nextElementSibling.nextElementSibling;
  grid.innerHTML="";
  for(let i=0;i<sel.value;i++){
    const inp=document.createElement("input");
    inp.placeholder=`Crew Member ${i+1}`;
    grid.appendChild(inp);
  }
}

function addItem(btn){
  const row=document.createElement("div");
  row.className="item-row";
  row.innerHTML=`
    <input placeholder="Item / Unit">
    <input placeholder="Details">
    <input placeholder="Vendor">
    <input placeholder="PO">
  `;
  btn.previousElementSibling.appendChild(row);
}

function deleteCrew(btn){
  const crews=btn.closest(".crews");
  btn.closest(".crew").remove();
  renumberCrews(crews);
}

function renumberCrews(crews){
  [...crews.querySelectorAll(".crew")].forEach((c,i)=>{
    c.querySelector(".crew-title").innerText = `Crew #${i+1}`;
  });
}

function fmtDate(v){
  const d=new Date(v+"T00:00");
  return `${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}/${String(d.getFullYear()).slice(-2)}`;
}
function fmtTime(v){
  if(!v)return "";
  let[h,m]=v.split(":");
  const ap=h>=12?"PM":"AM";
  h=h%12||12;
  return `${String(h).padStart(2,"0")}:${m} ${ap}`;
}

function copyAll(){
  let out=[];
  const cust=customer.value.trim();
  const loc=location.value.trim();
  if(cust||loc) out.push([cust,loc].filter(Boolean).join(" - "),"");

  [...daysDiv.children].forEach(day=>{
    out.push(fmtDate(day.querySelector("input[type=date]").value));
    [...day.querySelectorAll(".crew")].forEach(c=>{
      const size=c.querySelector("select").selectedOptions[0].text;
      const names=[...c.querySelectorAll(".crew-grid input")].map(i=>i.value).filter(Boolean);
      out.push(size,names.join(", "));
      const [st,et]=c.querySelectorAll("input[type=time]");
      out.push(`Start Time: ${fmtTime(st.value)}        Stop Time: ${fmtTime(et.value)}`);
      const wp=c.querySelector("textarea").value.trim();
      if(wp) out.push("",wp);

      [...c.querySelectorAll(".rentals .item-row")].forEach(r=>{
        const parts=[...r.querySelectorAll("input")].map(i=>i.value).filter(Boolean);
        if(parts.length) out.push(parts.join(" - "));
      });
      [...c.querySelectorAll(".materials .item-row")].forEach(m=>{
        const parts=[...m.querySelectorAll("input")].map(i=>i.value).filter(Boolean);
        if(parts.length) out.push(parts.join(" - "));
      });
      out.push("");
    });
  });

  navigator.clipboard.writeText(out.join("\n"));
  alert("Copied. Paste into MobileTech.");
}

addDay(today());
</script>
</body>
</html>
