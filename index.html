<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Resolution Notes</title>
<style>
body{
  font-family: Arial, sans-serif;
  background:#f8fafc;
  padding:20px;
}
.card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:8px;
  padding:12px;
  margin-bottom:16px;
}

.crew-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
}

.toggle{
  font-size:12px;
  cursor:pointer;
}

.crew-body{
  margin-top:10px;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:8px;
}

label{
  font-size:12px;
  font-weight:bold;
  display:block;
  margin-top:10px;
}

input, textarea, select{
  width:100%;
  padding:8px;
  border-radius:6px;
  border:1px solid #ddd;
}

.item-row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr 1fr;
  gap:6px;
  margin-top:6px;
}
</style>
</head>

<body>

<div class="card crew">
  <div class="crew-header">
    <span>Crew #1</span>
    <span class="toggle" onclick="toggleCrew(this)">Collapse</span>
  </div>

  <div class="crew-body">

    <label>Size</label>
    <select>
      <option>1-Man Crew</option>
      <option>2-Man Crew</option>
    </select>

    <label>Crew Members</label>
    <input placeholder="Crew Member 1">

    <label>Start / Stop Time</label>
    <div class="row">
      <input type="time">
      <input type="time">
    </div>

    <label>Work Performed</label>
    <textarea></textarea>

    <label>Rentals</label>
    <div class="item-row">
      <input placeholder="Item">
      <input placeholder="Details">
      <input placeholder="Vendor">
      <input placeholder="PO">
    </div>

    <label>Materials</label>
    <div class="item-row">
      <input placeholder="Item">
      <input placeholder="Details">
      <input placeholder="Vendor">
      <input placeholder="PO">
    </div>

  </div>
</div>
