<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MobileTech Resolution Notes</title>

<style>
:root {
  --border:#e5e7eb;
  --bg:#f8fafc;
  --card:#ffffff;
  --muted:#6b7280;
  --primary:#0f62fe;
}

body {
  margin:0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
  background:var(--bg);
}

.wrapper {
  max-width:900px;
  margin:auto;
  padding:16px;
  padding-bottom:160px;
}

.top-bar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

h1 {
  font-size:20px;
  margin:0;
}

.help-btn {
  font-size:13px;
  padding:6px 10px;
  border-radius:6px;
  border:1px solid var(--border);
  background:#fff;
  cursor:pointer;
}

.card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  padding:12px;
  margin-bottom:16px;
}

label {
  font-size:12px;
  font-weight:600;
  display:block;
  margin-top:8px;
}

input, textarea, select, button {
  width:100%;
  padding:10px;
  border-radius:6px;
  border:1px solid var(--border);
  font-size:14px;
}

textarea { resize:vertical; }

.hint {
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
}

.row {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

@media (max-width:600px) {
  .row { grid-template-columns:1fr; }
}

details.crew {
  border:1px solid var(--border);
  border-radius:8px;
  padding:8px;
  margin-top:12px;
  background:#fff;
}

details.crew summary {
  font-weight:700;
  cursor:pointer;
  list-style:none;
}

details.crew summary::-webkit-details-marker {
  display:none;
}

details.crew summary::before {
  content:"▶";
  display:inline-block;
  margin-right:6px;
  transition:transform 0.2s;
}

details[open].crew summary::before {
  transform:rotate(90deg);
}

.crew-body {
  margin-top:10px;
}

.crew-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:8px;
  margin-top:6px;
}

.item-row {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:8px;
  margin-top:6px;
}

.small-btn {
  font-size:12px;
  padding:8px;
}

.delete-btn {
  background:#ef4444;
  color:#fff;
  margin-top:12px;
}

.bottom-bar {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  justify-content:center;
  gap:8px;
  padding:10px;
  background:#fff;
  border-top:1px solid var(--border);
}

.primary {
  background:var(--primary);
  color:#fff;
}
</style>
</head>

<body>
<div class="wrapper">

<div class="top-bar">
  <h1>MobileTech Resolution Notes</h1>
  <button class="help-btn" onclick="alert('Use the form to build resolution notes. Optional fields may be left blank. Nothing is saved. Use Copy All when finished.')">
    Help
  </button>
</div>

<div class="card">

  <input placeholder="Customer">

  <label>Lease / Location</label>

</div>

<!-- Date -->
<div class="card">
  <label>Date</label>
  <input type="date">
</div>

      <option>5‑Man Crew</option>

    <label>Crew Members</label>
    <div class="crew-grid">
      <input placeholder="Crew Member 1">

    <label>Start Time / Stop Time</label>
    <div class="row">
      <input type="time">

    <label>Work Performed</label>

    <div class="item-row">
      <input placeholder="Item / Unit">
      <input placeholder="Details">
      <input placeholder="Vendor">
      <input placeholder="PO">
    </div>
