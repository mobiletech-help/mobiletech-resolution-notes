<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MobileTech Resolution Notes</title>

<style>
body {
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
  background: #f8fafc;
  margin: 0;
}
.wrapper {
  max-width: 900px;
  margin: auto;
  padding: 16px;
  padding-bottom: 160px;
}
h1 {
  font-size: 20px;
  margin: 0;
}
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
button {
  padding: 8px 12px;
  border-radius: 6px;
  border: 1px solid #d1d5db;
  background: #fff;
  cursor: pointer;
}
.primary {
  background: #0f62fe;
  color: #fff;
  border-color: #0f62fe;
}
.card {
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 16px;
}
label {
  font-size: 12px;
  font-weight: 600;
  display: block;
  margin-top: 8px;
}
input, textarea, select {
  width: 100%;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #d1d5db;
  font-size: 14px;
}
textarea { resize: vertical; }
.hint {
  font-size: 12px;
  color: #6b7280;
  margin-top: 4px;
}
.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
@media(max-width:600px) {
  .row { grid-template-columns: 1fr; }
}

/* Crew collapse */
details.crew {
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  padding: 8px;
  margin-top: 12px;
}
details.crew summary {
  font-weight: 700;
  cursor: pointer;
  list-style: none;
}
details.crew summary::-webkit-details-marker { display: none; }
details.crew summary::before {
  content: "▶";
  display: inline-block;
  margin-right: 6px;
  transition: transform 0.2s;
}
details[open].crew summary::before {
  transform: rotate(90deg);
}

.crew-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px,1fr));
  gap: 8px;
}
.item-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px,1fr));
  gap: 8px;
  margin-top: 6px;
}
.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #fff;
  border-top: 1px solid #e5e7eb;
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 10px;
}
</style>
</head>

<body>
<div class="wrapper">

<div class="top-bar">
  <h1>MobileTech Resolution Notes</h1>
  <button id="helpBtn">Help</button>
</div>

<div class="card">
  <label>Customer</label>
  <input id="customer">
  <div class="hint">(Optional)</div>

  <label>Lease / Location</label>
  <input id="location">
  <div class="hint">(Optional)</div>
</div>

<div id="days"></div>

</div>

<div class="bottom-bar">
  <button id="clearAll">Clear All</button>
  <button class="primary" id="nextDay">Next Day</button>
  <button id="copyAll">Copy All</button>
</div>

<script>
const daysDiv = document.getElementById("days");

function today() {
  return new Date().toISOString().split("T")[0];
}

function createCrew(num) {
  const d = document.createElement("details");
  d.className = "crew";
  d.open = true;
  d.innerHTML = `
    <summary>Crew #${num}</summary>

    <label>Crew size</label>
    <select>
      <option>1-Man Crew</option>
      <option>2-Man Crew</option>
      <option>3-Man Crew</option>
      <option>4-Man Crew</option>
      <option>5-Man Crew</option>
    </select>

    <label>Crew members</label>
    <div class="crew-grid">
      <input placeholder="Crew Member 1">
    </div>

    <label>Start time / Stop time</label>
    <div class="row">
      <input type="time">
      <input type="time">
    </div>

    <label>Work performed</label>
    <textarea></textarea>

    <label>Rental (if applicable)</label>
    <div class="item-row">
      <input placeholder="Item / Unit">
      <input placeholder="Details">
      <input placeholder="Vendor">
      <input placeholder="PO">
    </div>

    <label>Material (if applicable)</label>
    <div class="item-row">
      <input placeholder="Item">
      <input placeholder="Details">
      <input placeholder="Vendor">
      <input placeholder="PO">
    </div>
  `;
  return d;
}

function addDay(date) {
  const card = document.createElement("div");
  card.className = "card";

  const crews = document.createElement("div");

  const addCrewBtn = document.createElement("button");
  addCrewBtn.textContent = "Add Crew";
  addCrewBtn.addEventListener("click", () => {
    crews.appendChild(createCrew(crews.children.length + 1));
  });

  card.innerHTML = `
    <label>Date</label>
    <input type="date" value="${date}">
    <div class="hint"></div>
  `;
  card.appendChild(crews);
  card.appendChild(addCrewBtn);

  crews.appendChild(createCrew(1));
  daysDiv.appendChild(card);
}

document.getElementById("nextDay").addEventListener("click", () => {
  if (!daysDiv.lastElementChild) {
    addDay(today());
  } else {
    const lastDate = daysDiv.lastElementChild.querySelector("input[type=date]").value;
    const d = new Date(lastDate + "T00:00");
    d.setDate(d.getDate() + 1);
    addDay(d.toISOString().split("T")[0]);
  }
});

document.getElementById("clearAll").addEventListener("click", () => {
  if (confirm("Clear all entries?")) {
    daysDiv.innerHTML = "";
    addDay(today());
  }
});

document.getElementById("copyAll").addEventListener("click", () => {
  alert("Copy logic can be added exactly as discussed.");
});
