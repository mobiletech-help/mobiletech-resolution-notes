  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MobileTech Resolution Notes</title>

<style>
:root {
  --primary:#0F62FE;
  --border:#E5E7EB;
  --bg:#F8FAFC;
  --card:#FFFFFF;
}
body {
  margin:0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
  background:var(--bg);
}
.wrapper {
  max-width:900px;
  margin:auto;
  padding:16px;
  padding-bottom:140px;
}
h1{font-size:20px;margin:0;}
.card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  padding:12px;
  margin-bottom:16px;
}
label {
  font-size:12px;
  font-weight:600;
  display:block;
  margin-top:6px;
}
input, textarea, select, button {
  width:100%;
  padding:10px;
  border-radius:6px;
  border:1px solid var(--border);
  font-size:14px;
}
textarea {resize:vertical;}
.row {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
@media(max-width:600px){.row{grid-template-columns:1fr}}
.crew-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:8px;
  margin-top:8px;
}
.date-header {
  font-weight:700;
  margin-bottom:6px;
}
.divider {
  height:1px;
  background:var(--border);
  margin:12px 0;
}
.bottom-bar {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  justify-content:center;
  gap:8px;
  padding:10px;
  background:#fff;
  border-top:1px solid var(--border);
}
.primary {
  background:var(--primary);
  color:#fff;
  border-color:var(--primary);
}
</style>
</head>

<body>
<div class="wrapper">
  <h1>MobileTech Resolution Notes</h1>

  <datalist id="crewList"></datalist>
  <datalist id="customerList"></datalist>
  <datalist id="locationList"></datalist>

  <div class="card">
    <label>Customer & Lease</label>
    <div class="row">
      <input id="customer" list="customerList" placeholder="Customer">
      <input id="location" list="locationList" placeholder="Lease / Location">
    </div>
  </div>

  <div id="days"></div>
</div>

<div class="bottom-bar">
  <button class="primary" onclick="nextDay()">Next Day</button>
  <button onclick="copyAll()">Copy All</button>
</div>

<script>
const daysDiv = document.getElementById("days");
const today = () => new Date().toISOString().split("T")[0];

function addDay(date){
  const card=document.createElement("div");
  card.className="card";
  card.innerHTML=`
    <div class="date-header">${date}</div>
    <div class="divider"></div>
    <div class="crews"></div>
    <button onclick="addCrew(this)">Add Crew</button>
  `;
  daysDiv.appendChild(card);
  addCrew(card.querySelector("button")); // ✅ Crew #1 automatic
}

function nextDay(){
  const last = daysDiv.lastElementChild;
  const lastDate = last.querySelector(".date-header").innerText;
  const d=new Date(lastDate+"T00:00");
  d.setDate(d.getDate()+1);
  addDay(d.toISOString().split("T")[0]);
  daysDiv.lastElementChild.scrollIntoView({behavior:"smooth"});
}

function addCrew(btn){
  const crews=btn.previousElementSibling;
  const crewNum=crews.children.length+1;
  const c=document.createElement("div");
  c.innerHTML=`
    <label>Crew #${crewNum} Size</label>
    <select onchange="renderCrew(this)">
      <option value="1">1-Man Crew</option>
      <option value="2">2-Man Crew</option>
      <option value="3">3-Man Crew</option>
      <option value="4">4-Man Crew</option>
      <option value="5">5-Man Crew</option>
    </select>
    <div class="crew-grid"></div>
    <div class="row">
      <input type="time"><input type="time">
    </div>
    <label>Work Performed</label>
    <textarea></textarea>
  `;
  crews.appendChild(c);
  renderCrew(c.querySelector("select"));
}

function renderCrew(sel){
  const grid=sel.nextElementSibling;
  grid.innerHTML="";
  for(let i=0;i<sel.value;i++){
    const inp=document.createElement("input");
    inp.placeholder="Crew Member";
    grid.appendChild(inp);
  }
}

function copyAll(){
  let out=[];
  const cust=customer.value.trim();
  const loc=location.value.trim();
  if(cust||loc) out.push([cust,loc].filter(Boolean).join(" - "), "");
  [...daysDiv.children].forEach(day=>{
    out.push(day.querySelector(".date-header").innerText);
    [...day.querySelectorAll(".crews>div")].forEach(c=>{
      const size=c.querySelector("select").selectedOptions[0].text;
      const names=[...c.querySelectorAll(".crew-grid input")].map(i=>i.value).filter(Boolean);
      out.push(size,names.join(", "));
    });
    out.push("");
  });
  navigator.clipboard.writeText(out.join("\n"));
  alert("Copied.");
}

// Initialize first day ✅
addDay(today());
</script>
</body>
</html>
