<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MobileTech Resolution Notes</title>

<style>
body {
  font-family: system-ui, Arial, sans-serif;
  background:#f8fafc;
  margin:0;
}
.wrapper {
  max-width:900px;
  margin:auto;
  padding:16px;
  padding-bottom:190px;
}
.top-bar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}
h1 { margin:0; font-size:20px; }

button {
  padding:8px 12px;
  border-radius:6px;
  border:1px solid #d1d5db;
  background:#fff;
  cursor:pointer;
}
.primary {
  background:#0f62fe;
  color:#fff;
}

.card {
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:8px;
  padding:12px;
  margin-bottom:16px;
}

label {
  font-size:12px;
  font-weight:600;
  margin-top:10px;
  display:block;
}

.row {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
@media(max-width:600px){ .row{grid-template-columns:1fr;} }

input, textarea, select {
  width:100%;
  padding:10px;
  border-radius:6px;
  border:2px solid #d1d5db;
}
input:focus, textarea:focus, select:focus {
  outline:none;
  border-color:#0f62fe;
  box-shadow:0 0 0 3px rgba(15,98,254,.25);
}

/* Crew collapse */
details.crew {
  border:1px solid #e5e7eb;
  border-radius:8px;
  padding:8px;
  margin-top:12px;
}
details summary {
  font-weight:700;
  cursor:pointer;
  list-style:none;
}
summary::-webkit-details-marker { display:none; }
summary::before { content:"▶"; margin-right:6px; }
details[open] summary::before { transform:rotate(90deg); }

.crew-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:8px;
}

/* Rental / Material rows */
.line-row {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr)) 40px;
  gap:6px;
  align-items:center;
  margin-top:6px;
}
.remove-btn {
  background:#ef4444;
  color:#fff;
  border:none;
  border-radius:4px;
  cursor:pointer;
}

.bottom-bar {
  position:fixed;
  bottom:0; left:0; right:0;
  background:#fff;
  border-top:1px solid #e5e7eb;
  display:flex;
  justify-content:center;
  gap:8px;
  padding:10px;
}
</style>
</head>

<body>
<div class="wrapper">

<div class="top-bar">
  <h1>MobileTech Resolution Notes</h1>
  <button onclick="alert('Use Add buttons to add crews, trucks, rentals, and materials. Each truck must be 4 digits.')">Help</button>
</div>

<div class="card">
  <label>Customer</label>
  <input>

  <label>Lease / Location</label>
  <input>
</div>

<div id="days"></div>
</div>

<div class="bottom-bar">
  <button onclick="clearAll()">Clear All</button>
  <button class="primary" onclick="nextDay()">Next Day</button>
  <button onclick="copyAll()">Copy All</button>
</div>

<script>
const daysDiv = document.getElementById("days");

function today(){ return new Date().toISOString().split("T")[0]; }

function addLine(container){
  const row=document.createElement("div");
  row.className="line-row";
  row.innerHTML=`
    <input placeholder="Item / Unit">
    <input placeholder="Details">
    <input placeholder="Qty / Miles">
    <input placeholder="Vendor">
    <input placeholder="PO">
    <button class="remove-btn">✕</button>
  `;
  row.querySelector("button").onclick=()=>row.remove();
  container.appendChild(row);
}

function updateCrewMembers(sel){
  const grid=sel.closest("details").querySelector(".crew-grid");
  const cnt=+sel.value;
  grid.innerHTML="";
  for(let i=0;i<cnt;i++){
    const inp=document.createElement("input");
    inp.placeholder=`Crew Member ${i+1}`;
    grid.appendChild(inp);
  }
}

function createCrew(num){
  const d=document.createElement("details");
  d.open=true; d.className="crew";
  d.innerHTML=`
    <summary>Crew #${num}</summary>

    <label>Crew size</label>
    <select>
      <option value="1">1‑Man Crew</option>
      <option value="2">2‑Man Crew</option>
      <option value="3">3‑Man Crew</option>
      <option value="4">4‑Man Crew</option>
      <option value="5">5‑Man Crew</option>
    </select>

    <label>Crew members</label>
    <div class="crew-grid"></div>

    <label>Start / Stop</label>
    <div class="row">
      <input type="time">
      <input type="time">
    </div>

    <label>Work performed</label>
    <textarea></textarea>

    <label>Rental (if applicable)</label>
    <div class="rentals"></div>
    <button>Add Rental</button>

    <label>Material (if applicable)</label>
    <div class="materials"></div>
    <button>Add Material</button>

    <button onclick="this.closest('details').remove()">Delete Crew</button>
  `;

  const sel=d.querySelector("select");
  sel.onchange=()=>updateCrewMembers(sel);
  updateCrewMembers(sel);

  const rentals=d.querySelector(".rentals");
  const materials=d.querySelector(".materials");

  d.querySelectorAll("button")[0].onclick=()=>addLine(rentals);
  d.querySelectorAll("button")[1].onclick=()=>addLine(materials);

  return d;
}

function addDay(date){
  const card=document.createElement("div");
  card.className="card";
  card.innerHTML=`<label>Date</label><input type="date" value="${date}">`;
  const crews=document.createElement("div");
  const btn=document.createElement("button");
  btn.textContent="Add Crew";
  btn.onclick=()=>crews.appendChild(createCrew(crews.children.length+1));
  crews.appendChild(createCrew(1));
  card.appendChild(crews);
  card.appendChild(btn);
  daysDiv.appendChild(card);
}

function nextDay(){
  const last=daysDiv.lastElementChild.querySelector("input").value;
  const d=new Date(last+"T00");
  d.setDate(d.getDate()+1);
  addDay(d.toISOString().split("T")[0]);
}

function clearAll(){
  if(confirm("Clear all entries?")){
    daysDiv.innerHTML="";
    addDay(today());
  }
}

function copyAll(){
  alert("Copy formatting will include rentals/materials next.");
}

document.addEventListener("DOMContentLoaded",()=>addDay(today()));
</script>
</body>
</html>
