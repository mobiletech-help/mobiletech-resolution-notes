<!-- Template V1.3-dev (Sandbox)
     Base: Template V1.2.1-dev
     Additions:
       • Crew member smart-fill (ALL CAPS) + duplicate-per-day rule
       • Rentals/Materials DESCRIPTION smart-fill (static + learning)
       • Copy All shows crew size and AM/PM time formatting
-->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MobileTech Resolution Notes</title>

<style>
body { font-family: system-ui, Arial, sans-serif; background:#eef6ff; /* DEV / SANDBOX background */ margin:0; }
.wrapper { max-width:900px; margin:auto; padding:16px; padding-bottom:240px; }
.top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
h1 { margin:0; font-size:20px; }
button { padding:8px 12px; border-radius:6px; border:1px solid #d1d5db; background:#fff; cursor:pointer; }
.primary { background:#0f62fe; color:#fff; }
.card { background:#fff; border:1px solid #e5e7eb; border-radius:8px; padding:12px; margin-bottom:16px; }
label { font-size:12px; font-weight:600; margin-top:10px; display:block; }
.helper { font-size:11px; color:#6b7280; margin-bottom:4px; }
input, textarea, select { width:100%; padding:10px; border-radius:6px; border:2px solid #d1d5db; }
.row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
details.crew { border:1px solid #e5e7eb; border-radius:8px; padding:8px; margin-top:12px; }
details summary { font-weight:700; cursor:pointer; list-style:none; }
summary::-webkit-details-marker{display:none}
summary::before{content:"▶";margin-right:6px}
details[open] summary::before{transform:rotate(90deg)}
.crew-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.line-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr)) 36px;gap:6px;margin-top:6px}
.remove-btn{background:#ef4444;color:#fff;border:none;border-radius:4px;cursor:pointer}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e5e7eb;display:flex;justify-content:center;gap:8px;padding:10px}
.help-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;z-index:100}
.help-panel{position:absolute;right:0;top:0;width:420px;height:100%;background:#fff;padding:16px;overflow-y:auto}
.help-close{text-align:right;font-weight:600;color:#0f62fe;cursor:pointer}
</style>
</head>

<body>
<div class="wrapper">

<div class="top-bar">
  <h1>MobileTech Resolution Notes</h1>
  <button id="helpBtn">Help</button>
</div>

<!-- Smartfill lists -->
<datalist id="customerList"></datalist>
<datalist id="crewMemberList"></datalist>
<datalist id="rentalDescList"></datalist>
<datalist id="materialDescList"></datalist>

<div class="card">
  <label>Customer</label>
  <input id="customer" list="customerList">
  <label>Lease / Location</label>
  <input id="location">
</div>

<div id="days"></div>
</div>

<div class="bottom-bar">
  <button id="clearAll">Clear All</button>
  <button id="nextDay" class="primary">Next Day</button>
  <button id="copyAll">Copy All</button>
</div>

<!-- HELP -->
<div class="help-overlay" id="helpOverlay">
<div class="help-panel">
<div class="help-close" id="helpClose">Close ✕</div>
<h3>How to Use This Page</h3>
<p>This tool creates clean MobileTech resolution notes. Use <strong>Copy All</strong> when finished.</p>
</div>
</div>

<script>
/* ================= UTILITIES ================= */
function today(){return new Date().toISOString().split("T")[0];}
function fmtDateMMDDYY(v){
 const d=new Date(v+"T00");
 return `${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}/${String(d.getFullYear()).slice(-2)}`;
}
function toAMPM(time){
 if(!time) return "";
 let [h,m]=time.split(":").map(Number);
 const ap=h>=12?"PM":"AM";
 h=h%12||12;
 return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")} ${ap}`;
}

/* ================= SMARTFILL STORES ================= */
function storeGet(k){return JSON.parse(localStorage.getItem(k)||"[]");}
function storeAdd(k,v){
 if(!v) return;
 v=v.toUpperCase();
 const a=storeGet(k);
 if(!a.includes(v)){a.push(v);localStorage.setItem(k,JSON.stringify(a));}
}
function fillList(id,arr){
 const dl=document.getElementById(id); dl.innerHTML="";
 arr.forEach(v=>{const o=document.createElement("option");o.value=v;dl.appendChild(o);});
}

/* ================= STATIC LISTS ================= */
const RENTAL_DESCS=["325 HP PUMP","600 HP PUMP","12\" LAYFLAT","10\" LAYFLAT","ROAD CROSSING","GENERATOR","FLOWMETER"];
const MATERIAL_DESCS=["LINER","GEO","FUEL","CLAMPS","FITTINGS"];

/* ================= CREW HELPERS ================= */
function updateCrewMembers(sel){
 const grid=sel.closest("details").querySelector(".crew-grid");
 grid.innerHTML="";
 for(let i=0;i<+sel.value;i++){
  const inp=document.createElement("input");
  inp.placeholder=`Crew Member ${i+1}`;
  inp.setAttribute("list","crewMemberList");

  inp.oninput=e=>e.target.value=e.target.value.toUpperCase();
  inp.onblur=e=>{
    const val=e.target.value.trim();
    if(!val) return;

    // duplicate-per-day check
    const day=e.target.closest(".card");
    day.querySelectorAll(".crew-grid input").forEach(o=>{
      if(o!==inp && o.value===val){
        const crew=o.closest("details").querySelector("summary").textContent;
        alert(`${val} is already assigned to ${crew} for this day.`);
        inp.value="";
        inp.focus();
      }
    });
    storeAdd("crewMembers",val);
    fillList("crewMemberList",storeGet("crewMembers"));
  };
  grid.appendChild(inp);
 }
}

/* ================= ROW ADDER ================= */
function addRow(container, placeholders, listId){
 const row=document.createElement("div");
 row.className="line-row";
 placeholders.forEach((ph,i)=>{
  const inp=document.createElement("input");
  inp.placeholder=ph;
  if(listId && i===1){ // Description field
    inp.setAttribute("list",listId);
    inp.oninput=e=>e.target.value=e.target.value.toUpperCase();
    inp.onblur=e=>storeAdd(listId==="rentalDescList"?"rentalDesc":"materialDesc",e.target.value);
  }
  row.appendChild(inp);
 });
 const rm=document.createElement("button");
 rm.textContent="✕"; rm.className="remove-btn"; rm.onclick=()=>row.remove();
 row.appendChild(rm);
 container.appendChild(row);
}

/* ================= CREATE CREW ================= */
function createCrew(num){
 const d=document.createElement("details");
 d.className="crew"; d.open=true;
 d.innerHTML=`
  <summary>Crew #${num}</summary>

  <label>Crew size</label>
  <select>
    <option value="1">1-MAN</option><option value="2">2-MAN</option>
    <option value="3">3-MAN</option><option value="4">4-MAN</option>
    <option value="5">5-MAN</option>
  </select>

  <label>Crew members</label>
  <div class="crew-grid"></div>

  <label>Start / Stop Time</label>
  <div class="row"><input type="time"><input type="time"></div>

  <label>Work Performed</label>
  <textarea></textarea>

  <label>Rentals</label>
  <div class="rentals"></div>
  <button class="addRental">Add Rental</button>

  <label>Materials</label>
  <div class="materials"></div>
  <button class="addMaterial">Add Material</button>

  <button class="removeCrew">Delete Crew</button>
 `;
 const sel=d.querySelector("select");
 sel.onchange=()=>updateCrewMembers(sel);
 updateCrewMembers(sel);

 d.querySelector(".addRental").onclick=()=>{
  addRow(d.querySelector(".rentals"),
   ["Item / Unit #","Description","Qty / Distance","Vendor","PO"],
   "rentalDescList"
  );
 };
 d.querySelector(".addMaterial").onclick=()=>{
  addRow(d.querySelector(".materials"),
   ["Item / Description","Description","Qty","Vendor","PO"],
   "materialDescList"
  );
 };
 d.querySelector(".removeCrew").onclick=()=>d.remove();
 return d;
}

/* ================= DAY ================= */
function addDay(ds){
 const c=document.createElement("div");
 c.className="card";
 c.innerHTML=`<label>Date</label><input type="date" value="${ds}">`;
 const crews=document.createElement("div");
 crews.appendChild(createCrew(1));
 const addCrewBtn=document.createElement("button");
 addCrewBtn.textContent="Add Crew";
 addCrewBtn.onclick=()=>crews.appendChild(createCrew(crews.children.length+1));
 c.appendChild(crews); c.appendChild(addCrewBtn);
 document.getElementById("days").appendChild(c);
}

/* ================= COPY ALL ================= */
copyAll.onclick=()=>{
 let o=[];
 if(customer.value||location.value){
  o.push([customer.value,location.value].filter(Boolean).join(" – "), "");
 }

 document.querySelectorAll("#days .card").forEach(day=>{
  o.push(fmtDateMMDDYY(day.querySelector("input").value));
  day.querySelectorAll("details").forEach(cr=>{
    const size=cr.querySelector("select").value;
    o.push(`Crew #${cr.querySelector("summary").textContent.split("#")[1]} – ${size}-MAN CREW`);

    const members=[...cr.querySelectorAll(".crew-grid input")].map(i=>i.value).filter(Boolean);
    if(members.length) o.push(members.join(", "));

    const times=cr.querySelectorAll('input[type="time"]');
    o.push(`Start: ${toAMPM(times[0].value)}   Stop: ${toAMPM(times[1].value)}`);

    const notes=cr.querySelector("textarea").value.trim();
    if(notes) o.push(notes);

    const rentals=[...cr.querySelectorAll(".rentals .line-row input")]
      .map(i=>i.value).filter(Boolean);
    if(rentals.length){o.push("", "Rentals:"); rentals.forEach(r=>o.push("• "+r));}

    const mats=[...cr.querySelectorAll(".materials .line-row input")]
      .map(i=>i.value).filter(Boolean);
    if(mats.length){o.push("", "Materials:"); mats.forEach(m=>o.push("• "+m));}
    o.push("");
  });
  o.push("");
 });
 navigator.clipboard.writeText(o.join("\n").trim());
 alert("Copied.");
};

/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded",()=>{
 storeAdd("rentalDesc","");
 storeAdd("materialDesc","");
 fillList("rentalDescList",[...RENTAL_DESCS,...storeGet("rentalDesc")]);
 fillList("materialDescList",[...MATERIAL_DESCS,...storeGet("materialDesc")]);
 fillList("crewMemberList",storeGet("crewMembers"));
 addDay(today());
});
customer.oninput=e=>e.target.value=e.target.value.toUpperCase();
customer.onblur=e=>{storeAdd("customers",e.target.value);fillList("customerList",storeGet("customers"));};
location.oninput=e=>e.target.value=e.target.value.toUpperCase();
</script>
</body>
</html>
